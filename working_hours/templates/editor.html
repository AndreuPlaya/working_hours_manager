<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Working Hours Editor</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/editor.css') }}">
</head>
<body>
<header>
  <h1>Working Hours Editor</h1>
  <span id="hdr-user" class="hdr-user"></span>
  <a href="/admin" id="hdr-admin" class="hdr-icon" title="Admin Settings" style="display:none">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </a>
  <button onclick="openPwModal()" id="hdr-pw" class="hdr-icon" title="Change Password" style="display:none;background:none;border:none;cursor:pointer;padding:0;color:inherit">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
  </button>
  <a href="/logout" class="hdr-icon" title="Logout">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
  </a>
</header>
<div class="layout">
  <nav class="sidebar">
    <h2>Employees</h2>
    <div id="emp-list"><p style="color:#94a3b8;font-size:.8rem">Loading&hellip;</p></div>
  </nav>
  <main class="main">
    <div class="report-toolbar" id="editor-bar" style="display:none">
      <h2 id="ptitle" style="flex:1;font-size:1rem;font-weight:600;margin:0"></h2>
      <button class="btn btn-danger" id="btn-del-sel" style="display:none" onclick="bulkDelete()">Delete Selected</button>
      <button class="btn btn-secondary" id="btn-to-report" onclick="viewReports()" title="View Report" aria-label="View Report">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Reports
      </button>
      <button class="btn btn-primary" id="btn-add" onclick="openAdd()">+ Add Session</button>
    </div>
    <div class="report-toolbar" id="report-bar" style="display:none">
      <div id="year-tabs" style="display:flex;gap:.35rem;flex:1"></div>
      <button class="btn btn-secondary" id="btn-print" onclick="printReport()" title="Print Report" aria-label="Print Report">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print
      </button>
      <button class="btn btn-secondary" onclick="showEditorMode()" title="Edit Sessions" aria-label="Edit Sessions">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit Sessions
      </button>
    </div>
    <div class="main-inner">
      <div id="no-sel" class="placeholder">Select an employee to view their sessions.</div>
      <div id="panel" style="display:none">
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" id="cb-all" onchange="toggleAll(this.checked)" title="Select all"></th>
              <th class="sortable" onclick="toggleSort()">Date <span id="sort-icon">&#x2191;</span></th>
              <th>Clock In</th>
              <th>Clock Out</th>
              <th>Duration</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
    <div id="report-view" class="report-view" style="display:none">
      <iframe id="report-frame" src="about:blank"></iframe>
    </div>
  </main>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Add Session</h3>
    <div class="fg">
      <label>Clock In</label>
      <input type="datetime-local" id="modal-in" step="1">
    </div>
    <div class="fg">
      <label>Clock Out <span class="opt">(optional)</span></label>
      <input type="datetime-local" id="modal-out" step="1">
    </div>
    <div class="mfoot">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>
<div class="modal-bg" id="pw-modal">
  <div class="modal">
    <h3>Change Password</h3>
    <div class="fg">
      <label>Current Password</label>
      <input type="password" id="pw-current" style="width:100%;padding:.42rem .65rem;border:1px solid #cbd5e1;border-radius:.375rem;font-size:.875rem;font-family:inherit">
    </div>
    <div class="fg">
      <label>New Password</label>
      <input type="password" id="pw-new" style="width:100%;padding:.42rem .65rem;border:1px solid #cbd5e1;border-radius:.375rem;font-size:.875rem;font-family:inherit">
    </div>
    <div class="fg">
      <label>Confirm New Password</label>
      <input type="password" id="pw-confirm" style="width:100%;padding:.42rem .65rem;border:1px solid #cbd5e1;border-radius:.375rem;font-size:.875rem;font-family:inherit">
    </div>
    <div id="pw-err" style="color:#ef4444;font-size:.8rem;margin-top:.25rem"></div>
    <div class="mfoot">
      <button class="btn btn-secondary" onclick="closePwModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitPwChange()">Change Password</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var data={},profiles={},myReports=[],adminViewReports=[],curReportIdx=0,cur=null,sortAsc=true,restrictEdits=false,isAdmin=false,inReportMode=false,_initialLoad=true,myPending=[];
function getReports(){return isAdmin?adminViewReports:myReports;}
var TRASH='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';

async function load(){
  var first=_initialLoad;_initialLoad=false;
  var [evR,cfgR,profR,repR,penR]=await Promise.all([fetch('/api/events'),fetch('/api/config'),fetch('/api/profiles'),fetch('/api/my-reports'),fetch('/api/my-pending')]);
  data=await evR.json();
  var cfg=await cfgR.json();
  profiles=await profR.json();
  myReports=await repR.json();
  myPending=await penR.json();
  isAdmin=cfg.is_admin;
  restrictEdits=cfg.restrict_edits;
  document.getElementById('hdr-user').textContent=cfg.username||'';
  document.getElementById('hdr-admin').style.display=cfg.is_admin?'':'none';
  document.getElementById('hdr-pw').style.display=(cfg.username&&!cfg.is_admin)?'':'none';
  if(!isAdmin)document.querySelector('.sidebar').style.display='none';
  renderSidebar();
  if(!isAdmin&&first){showReportMode();return;}
  if(inReportMode){renderYearTabs();return;}
  var keys=Object.keys(data);
  if(!cur&&keys.length===1){sel(keys[0]);}
  else if(cur&&data[cur]){renderEvents();}
  else if(cur){cur=null;showPanel(false);}
}

function getAlias(empId){
  var p=profiles[empId];
  return p&&p.alias?p.alias:null;
}

function renderSidebar(){
  var div=document.getElementById('emp-list');
  var keys=Object.keys(data).sort(function(a,b){
    var an=getAlias(a.split('|')[0])||a.split('|')[1];
    var bn=getAlias(b.split('|')[0])||b.split('|')[1];
    return an.localeCompare(bn);
  });
  if(!keys.length){div.innerHTML='<p style="color:#94a3b8;font-size:.8rem">No data.</p>';return;}
  div.innerHTML=keys.map(function(k){
    var p=k.split('|');
    var alias=getAlias(p[0])||p[1];
    var label='#'+p[0]+' — '+alias;
    var enc=k.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    return '<button class="emp-btn'+(k===cur?' active':'')+'" data-k="'+enc+'">'+label+'<small>'+p[2]+'</small></button>';
  }).join('');
}

function sel(k){
  cur=k;renderSidebar();
  if(isAdmin&&inReportMode){
    var empId=k.split('|')[0];
    fetch('/api/employee-reports/'+encodeURIComponent(empId))
      .then(function(r){return r.json();})
      .then(function(reps){adminViewReports=reps;renderYearTabs();if(reps.length)loadReport(0);});
    return;
  }
  showPanel(true);renderEvents();
}
function toggleSort(){sortAsc=!sortAsc;document.getElementById('sort-icon').innerHTML=sortAsc?'&#x2191;':'&#x2193;';renderEvents();}
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('emp-list').addEventListener('click',function(e){
    var b=e.target.closest('.emp-btn');if(b)sel(b.dataset.k);
  });
});
function showPanel(s){document.getElementById('no-sel').style.display=s?'none':'';document.getElementById('panel').style.display=s?'':'none';document.getElementById('editor-bar').style.display=s?'':'none';}

function renderEvents(){
  var p=cur.split('|');
  var displayName=getAlias(p[0])||p[1];
  document.getElementById('ptitle').textContent=displayName+' — '+p[2];
  var rows=data[cur]||[];
  var tbody=document.getElementById('tbody');
  if(!sortAsc)rows=rows.slice().reverse();
  var cbHead=document.getElementById('cb-all');
  cbHead.style.display=restrictEdits?'none':'';
  document.getElementById('btn-add').style.display=restrictEdits?'none':'';
  var curEmpId=p[0];
  var empPending=myPending.filter(function(item){return String(item.emp_id)===String(curEmpId);});
  var pendingEditByTs={};
  var pendingAdds=[];
  empPending.forEach(function(item){
    if(item.action==='EDIT'){pendingEditByTs[item.timestamp]=item;}
    else if(item.action==='ADD'){pendingAdds.push(item);}
  });
  var PEND_BADGE='<span style="background:#d97706;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:5px;vertical-align:middle">pending</span>';
  function pendingCell(originalVal,newVal){
    return '<span style="text-decoration:line-through;color:#9ca3af">'+escH(originalVal)+'</span>'+
           ' <span style="color:#d97706;font-weight:600">'+escH(newVal)+'</span>'+PEND_BADGE;
  }
  tbody.innerHTML=rows.map(function(s,i){
    var inClass=restrictEdits?'':'editable';
    var outClass='editable'+(s.clock_out?'':' inc-cell');
    var cbCell=restrictEdits?'<td></td>':'<td><input type="checkbox" class="rcb" data-i="'+i+'" onchange="onCheck()"></td>';
    var delCell=restrictEdits?'<td></td>':'<td><button class="btn-icon" data-del="'+i+'" title="Delete session">'+TRASH+'</button></td>';
    var inVal=s.clock_in.split(' ')[1];
    var outVal=s.clock_out?s.clock_out.split(' ')[1]:'?';
    var inPend=pendingEditByTs[s.clock_in];
    var outPend=s.clock_out?pendingEditByTs[s.clock_out]:null;
    var addPend=!s.clock_out?pendingAdds.find(function(a){return a.timestamp.split(' ')[0]===s.clock_in.split(' ')[0];}):null;
    var rowStyle=inPend||outPend||addPend?'background:#fffbeb':'';
    var inDisplay=inPend?pendingCell(inVal,inPend.new_timestamp.split(' ')[1]):escH(inVal);
    var outDisplay=outPend?pendingCell(outVal,outPend.new_timestamp.split(' ')[1])
                  :addPend?'<span style="color:#d97706;font-weight:600">'+escH(addPend.timestamp.split(' ')[1])+'</span>'+PEND_BADGE
                  :escH(outVal);
    return '<tr id="row'+i+'"'+(rowStyle?' style="'+rowStyle+'"':'')+'>'+cbCell+
      '<td>'+s.date+'</td>'+
      '<td class="'+inClass+'" data-i="'+i+'" data-f="in">'+inDisplay+'</td>'+
      '<td class="'+outClass+'" data-i="'+i+'" data-f="out">'+outDisplay+'</td>'+
      '<td>'+(s.duration||'')+'</td>'+delCell+'</tr>';
  }).join('')+pendingAdds.filter(function(item){
    return !rows.some(function(s){return !s.clock_out&&item.timestamp.split(' ')[0]===s.clock_in.split(' ')[0];});
  }).map(function(item){
    var dt=item.timestamp.split(' ');
    var dateStr=dt[0]?dt[0]+' ('+new Date(dt[0]+'T00:00:00').toLocaleDateString('en',{weekday:'short'})+')':'';
    return '<tr style="background:#fffbeb">'+
      '<td></td>'+
      '<td style="color:#92400e">'+escH(dateStr)+'</td>'+
      '<td style="color:#92400e"><span style="color:#a0aec0">—</span></td>'+
      '<td style="color:#d97706;font-weight:600">'+escH(dt[1]||'')+PEND_BADGE+'</td>'+
      '<td style="color:#92400e;font-size:12px">new session pending approval</td>'+
      '<td></td>'+
    '</tr>';
  }).join('');
  document.getElementById('cb-all').checked=false;
  document.getElementById('btn-del-sel').style.display='none';
  tbody.onclick=function(e){
    var del=e.target.closest('[data-del]');
    if(del){delSess(parseInt(del.dataset.del));return;}
    var td=e.target.closest('td.editable');
    if(td&&!td.classList.contains('editing'))startEdit(td);
  };
}

function startEdit(td){
  var i=parseInt(td.dataset.i),field=td.dataset.f;
  var s=data[cur][i];
  var origText=td.textContent,origClass=td.className;
  var curVal=field==='in'?s.clock_in:s.clock_out;
  var baseDate=(curVal||s.clock_in).split(' ')[0];
  td.className='editing';td.textContent='';
  var input=document.createElement('input');
  input.type='time';input.step='1';input.lang='en-GB';
  input.value=curVal?curVal.split(' ')[1]:'';
  td.appendChild(input);input.focus();input.select();
  var done=false;
  function finish(save){
    if(done)return;done=true;
    td.textContent=origText;td.className=origClass;
    if(!save||!input.value)return;
    var newTs=baseDate+' '+input.value;
    if(newTs===curVal)return;
    var p=cur.split('|');
    var req;
    if(field==='in')
      req=post('/api/edit',{emp_id:p[0],name:p[1],dept:p[2],old_timestamp:s.clock_in,new_timestamp:newTs});
    else if(s.clock_out)
      req=post('/api/edit',{emp_id:p[0],name:p[1],dept:p[2],old_timestamp:s.clock_out,new_timestamp:newTs});
    else
      req=post('/api/add',{emp_id:p[0],name:p[1],dept:p[2],timestamp:newTs});
    req.then(function(r){return r.json();}).then(function(d){toast(d.pending?'Submitted for approval.':'Saved.');load();});
  }
  input.addEventListener('blur',function(){finish(true);});
  input.addEventListener('keydown',function(e){
    if(e.key==='Enter'){e.preventDefault();input.blur();}
    if(e.key==='Escape'){done=true;td.textContent=origText;td.className=origClass;}
  });
}

function toggleAll(checked){
  document.querySelectorAll('.rcb').forEach(function(cb){cb.checked=checked;updateRowHighlight(cb);});
  document.getElementById('btn-del-sel').style.display=checked&&document.querySelectorAll('.rcb').length?'':'none';
}
function onCheck(){
  var all=document.querySelectorAll('.rcb');
  var checked=document.querySelectorAll('.rcb:checked');
  document.querySelectorAll('.rcb').forEach(updateRowHighlight);
  document.getElementById('cb-all').checked=all.length>0&&checked.length===all.length;
  document.getElementById('btn-del-sel').style.display=checked.length?'':'none';
}
function updateRowHighlight(cb){var row=document.getElementById('row'+cb.dataset.i);if(row)row.classList.toggle('selected',cb.checked);}
function getSelected(){return Array.from(document.querySelectorAll('.rcb:checked')).map(function(cb){return data[cur][parseInt(cb.dataset.i)];});}

async function bulkDelete(){
  var sel=getSelected();if(!sel.length)return;
  if(!confirm('Delete '+sel.length+' session(s)? This cannot be undone.'))return;
  var p=cur.split('|'),evs=[];
  sel.forEach(function(s){
    evs.push({emp_id:p[0],name:p[1],dept:p[2],timestamp:s.clock_in});
    if(s.clock_out)evs.push({emp_id:p[0],name:p[1],dept:p[2],timestamp:s.clock_out});
  });
  await post('/api/bulk-delete',evs);
  toast('Deleted '+sel.length+' session(s).');await load();
}
async function delSess(i){
  if(!confirm('Delete this session?'))return;
  var s=data[cur][i],p=cur.split('|');
  var evs=[{emp_id:p[0],name:p[1],dept:p[2],timestamp:s.clock_in}];
  if(s.clock_out)evs.push({emp_id:p[0],name:p[1],dept:p[2],timestamp:s.clock_out});
  await post('/api/bulk-delete',evs);toast('Session deleted.');await load();
}
function openAdd(){document.getElementById('modal-in').value='';document.getElementById('modal-out').value='';document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
async function saveModal(){
  var inVal=document.getElementById('modal-in').value;
  var outVal=document.getElementById('modal-out').value;
  if(!inVal){toast('Clock In is required.');return;}
  var p=cur.split('|');
  var r1=await post('/api/add',{emp_id:p[0],name:p[1],dept:p[2],timestamp:inVal.replace('T',' ')});
  var d1=await r1.json();var pending=d1.pending;
  if(outVal){var r2=await post('/api/add',{emp_id:p[0],name:p[1],dept:p[2],timestamp:outVal.replace('T',' ')});var d2=await r2.json();pending=pending||d2.pending;}
  toast(pending?'Submitted for approval.':'Session added.');closeModal();await load();
}
async function viewReports(){
  var btn=document.getElementById('btn-to-report');
  btn.disabled=true;
  if(isAdmin&&cur){
    var empId=cur.split('|')[0];
    adminViewReports=await fetch('/api/employee-reports/'+encodeURIComponent(empId)).then(function(r){return r.json();});
  }
  await load();
  showReportMode();
  if(getReports().length)loadReport(0);
  btn.disabled=false;
}
function showReportMode(){
  inReportMode=true;
  document.getElementById('report-view').style.display='flex';
  document.getElementById('report-bar').style.display='';
  document.getElementById('editor-bar').style.display='none';
  document.querySelector('.main-inner').style.display='none';
  if(!isAdmin)document.querySelector('.sidebar').style.display='none';
  renderYearTabs();
  var reps=getReports();
  if(reps.length)loadReport(0);
  else toast('No reports available yet.');
}
function showEditorMode(){
  inReportMode=false;
  document.getElementById('report-view').style.display='none';
  document.getElementById('report-bar').style.display='none';
  document.querySelector('.main-inner').style.display='';
  if(isAdmin)document.querySelector('.sidebar').style.display='';
  if(cur&&data[cur]){showPanel(true);renderEvents();}
  else{var keys=Object.keys(data);if(keys.length===1)sel(keys[0]);else showPanel(false);}
}
function renderYearTabs(){
  var reps=getReports();
  document.getElementById('year-tabs').innerHTML=reps.map(function(r,i){
    return '<button class="year-tab'+(i===curReportIdx?' active':'')+'" onclick="loadReport('+i+')">'+r.year+'</button>';
  }).join('');
}
function loadReport(idx){
  curReportIdx=idx;
  var reps=getReports();
  document.getElementById('report-frame').src=reps[idx].url+'?t='+Date.now();
  renderYearTabs();
}
function printReport(){
  var frame=document.getElementById('report-frame');
  if(frame.src==='about:blank'||!frame.src)return;
  frame.contentWindow.focus();
  frame.contentWindow.print();
}
function openPwModal(){
  document.getElementById('pw-current').value='';
  document.getElementById('pw-new').value='';
  document.getElementById('pw-confirm').value='';
  document.getElementById('pw-err').textContent='';
  document.getElementById('pw-modal').classList.add('open');
}
function closePwModal(){document.getElementById('pw-modal').classList.remove('open');}
async function submitPwChange(){
  var cur=document.getElementById('pw-current').value;
  var nw=document.getElementById('pw-new').value;
  var conf=document.getElementById('pw-confirm').value;
  var err=document.getElementById('pw-err');
  err.textContent='';
  if(!cur||!nw||!conf){err.textContent='All fields are required.';return;}
  if(nw!==conf){err.textContent='New passwords do not match.';return;}
  var r=await fetch('/api/change-password',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({current_password:cur,new_password:nw})});
  var d=await r.json();
  if(d.ok){closePwModal();toast('Password changed.');}
  else err.textContent=d.error||'Error.';
}
function escH(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function post(url,body){return fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});}
function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2500);}
window.addEventListener('storage',function(e){if(e.key==='raw-data-changed')load();});
