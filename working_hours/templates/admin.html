<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Working Hours — Admin</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
<script>var empData=[], admData=[], filesData=[], filesSortKey='name', filesSortAsc=true, pendingData=[];</script>
</head>
<body>
<header>
  <h1>Administration</h1>
  <a href="/" class="hdr-icon" title="Back to Editor">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  </a>
  <a href="/logout" class="hdr-icon" title="Logout">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
  </a>
</header>
<div class="wrap">
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('employees',this)">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Employees
    </button>
    <button class="tab-btn" onclick="showTab('admins',this)">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      System Admins
    </button>
    <button class="tab-btn" onclick="showTab('datafiles',this)">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
      Data Files
    </button>
    <button class="tab-btn" id="tab-btn-pending" onclick="showTab('pending',this)">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Pending <span id="pending-badge" style="display:none;background:#e53e3e;color:#fff;border-radius:9px;padding:1px 6px;font-size:11px;margin-left:4px;vertical-align:middle"></span>
    </button>
  </div>

  {% include 'admin/_employees.html' %}
  {% include 'admin/_admins.html' %}
  {% include 'admin/_datafiles.html' %}
  {% include 'admin/_pending.html' %}
</div>
<div class="toast" id="toast"></div>

<script>
async function init(){
  var [er,ar,fr,pr]=await Promise.all([fetch('/api/admin/employees'),fetch('/api/admin/admins'),fetch('/api/admin/raw-files'),fetch('/api/admin/pending')]);
  empData=await er.json(); admData=await ar.json(); filesData=await fr.json(); pendingData=await pr.json();
  renderEmployees(); renderAdmins(); renderDataFiles(); renderPending();
}

function showTab(name,btn){
  document.getElementById('tab-employees').hidden=(name!=='employees');
  document.getElementById('tab-admins').hidden=(name!=='admins');
  document.getElementById('tab-datafiles').hidden=(name!=='datafiles');
  document.getElementById('tab-pending').hidden=(name!=='pending');
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
}

function escH(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escA(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');}
function postJSON(url,body){return fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.json();});}
function putJSON(url,body){return fetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.json();});}
function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2500);}

init();
</script>
</body>
</html>
